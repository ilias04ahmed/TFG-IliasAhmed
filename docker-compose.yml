version: '3.8'

services:
  web:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - db
    volumes:
      - ./frontend/src:/var/www/html:ro
    env_file:
      - .env  

  api:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    env_file:
      - .env 

  db:
    image: postgres:15
    container_name: postgres_gps
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_gps_data:/var/lib/postgresql/data

volumes:
  postgres_gps_data: